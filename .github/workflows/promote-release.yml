name: Promote stable release

# Run after validating draft release artifacts. Publishes a draft stable release (non-RC tag).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    name: Publish draft release
    runs-on: ubuntu-latest
    steps:
      - name: Validate release promotion guardrails
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [[ "$TAG" == *"-rc"* ]]; then
            echo "Refuse to promote RC tags via this workflow; RC releases publish as prerelease automatically."
            exit 1
          fi

          RELEASE_IS_DRAFT=$(gh release view "$TAG" --repo "$REPO" --json isDraft --jq '.isDraft')
          if [[ "$RELEASE_IS_DRAFT" != "true" ]]; then
            echo "::error::Release $TAG must exist and remain in draft state before promotion."
            exit 1
          fi

          TARGET_SHA=$(gh api "repos/$REPO/commits/$TAG" --jq '.sha')
          if [[ -z "$TARGET_SHA" ]]; then
            echo "::error::Unable to resolve commit SHA for tag $TAG."
            exit 1
          fi

          for WORKFLOW_NAME in "CI" "Release"; do
            SUCCESSFUL_RUNS=$(gh run list \
              --repo "$REPO" \
              --workflow "$WORKFLOW_NAME" \
              --commit "$TARGET_SHA" \
              --json status,conclusion \
              --limit 20 \
              --jq '[.[] | select(.status == "completed" and .conclusion == "success")] | length')
            if [[ "$SUCCESSFUL_RUNS" -lt 1 ]]; then
              echo "::error::No successful '$WORKFLOW_NAME' workflow run found for commit $TARGET_SHA."
              exit 1
            fi
          done

          NIGHTLY_OK=$(gh run list \
            --repo "$REPO" \
            --workflow "Nightly Burn-In" \
            --json status,conclusion \
            --limit 1 \
            --jq 'if length == 0 then "false" else ((.[0].status == "completed") and (.[0].conclusion == "success")) end')
          if [[ "$NIGHTLY_OK" != "true" ]]; then
            echo "::error::Latest Nightly Burn-In run is not successful; promotion blocked."
            exit 1
          fi

      - name: Promote release from draft to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest
          echo "Published release $TAG"
