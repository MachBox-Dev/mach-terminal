name: Bug report
description: Something is broken in Mach Terminal
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Mach Terminal core should work with AI disabled — please note whether the issue reproduces with AI off.

        For **security vulnerabilities**, do not use this form. See [SECURITY.md](../../SECURITY.md).

  - type: input
    id: version
    attributes:
      label: Mach Terminal version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: e.g. Windows 11 26200, macOS 15.2, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Mach Terminal
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: ai
    attributes:
      label: AI enabled when this happened?
      options:
        - "No — AI off / not configured"
        - "Yes — BYOK provider"
        - "Yes — local (Ollama)"
        - Unknown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Optional. Redact API keys and paths you do not want public.
      render: shell
